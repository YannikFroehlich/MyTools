{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% translate 'Passwort geändert' %} | MyTools</title>

    <link rel="stylesheet" href="{% static 'app/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'app/css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('auth-dark');
        }
    </script>
</head>
<body class="auth-page">
    <button class="auth-theme-button dark-mode-btn" id="darkmode-button" type="button" aria-label="{% translate 'Dark Mode umschalten' %}">
        <i class="fa-solid fa-moon icon-moon"></i>
        <i class="fa-solid fa-sun icon-sun"></i>
    </button>

    <main class="auth-main">
        <section class="auth-panel" aria-labelledby="password-reset-complete-title">
            <div class="auth-brand">
                <span class="auth-logo" aria-hidden="true">
                    <i class="fa-solid fa-circle-check"></i>
                </span>

                <div>
                    <h1 id="password-reset-complete-title">{% translate 'Passwort geändert' %}</h1>
                    <p>{% translate 'Du kannst dich jetzt mit deinem neuen Passwort einloggen.' %}</p>
                </div>
            </div>

            <p class="auth-switch">
                <a href="{% url 'login' %}">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    {% translate 'Zum Login' %}
                </a>
            </p>
        </section>
    </main>

    <script src="{% static 'app/js/base.js' %}" defer></script>
    <script src="{% static 'app/js/auth.js' %}" defer></script>
</body>
</html>
