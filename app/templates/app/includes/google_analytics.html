{% load static %}
{% load i18n %}

<link rel="stylesheet" href="{% static 'app/css/google_analytics.css' %}">
<script
    id="mytools-ga-script"
    src="{% static 'app/js/google_analytics.js' %}"
    data-measurement-id="{{ google_analytics_id|escape }}"
    data-title="{% translate 'Analyse-Cookies erlauben?' %}"
    data-message="{% translate 'Wir nutzen Google Analytics, um MyTools zu verbessern. Google Analytics wird erst geladen, wenn du zustimmst.' %}"
    data-accept-label="{% translate 'Erlauben' %}"
    data-decline-label="{% translate 'Ablehnen' %}"
    defer></script>
