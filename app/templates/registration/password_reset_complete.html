{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% translate 'Passwort geändert' %} | MyTools</title>
    <link rel="stylesheet" href="{% static 'app/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'app/css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
    <main class="auth-main">
        <section class="auth-panel">
            <div class="auth-brand">
                <span class="auth-logo" aria-hidden="true">
                    <i class="fa-solid fa-circle-check"></i>
                </span>
                <div>
                    <h1>{% translate 'Passwort geändert' %}</h1>
                    <p>{% translate 'Du kannst dich jetzt mit deinem neuen Passwort einloggen.' %}</p>
                </div>
            </div>

            <p class="auth-switch">
                <a href="{% url 'login' %}">{% translate 'Zum Login' %}</a>
            </p>
        </section>
    </main>
    <script src="{% static 'app/js/base.js' %}"></script>
    <script src="{% static 'app/js/auth.js' %}"></script>
</body>
</html>
