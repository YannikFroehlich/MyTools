name: Test, Build and Deploy MyTools

on:
  workflow_dispatch:

  push:
    branches:
      - "**"

  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: mytools-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv_scan:
    name: OSV Security Scan
    runs-on: self-hosted

    permissions:
      contents: read
      actions: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: OSV Scanner installieren
        run: |
          set -e

          OSV_VERSION="v2.3.8"

          curl -L \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o osv-scanner

          chmod +x osv-scanner

          ./osv-scanner --version

      - name: OSV Scanner ausführen
        continue-on-error: true
        run: |
          echo ""
          echo "============================================================"
          echo "Starte OSV Security Scan..."
          echo "Dieser Schritt ist nur eine Warnung und blockiert den Workflow nicht."
          echo "============================================================"
          echo ""

          ./osv-scanner scan source -r .

      - name: Hinweis zum OSV Scan
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "OSV Security Scan wurde ausgeführt."
          echo ""
          echo "Wenn Sicherheitslücken gefunden wurden, findest du sie im Log vom Schritt:"
          echo "'OSV Scanner ausführen'"
          echo ""
          echo "Dort stehen normalerweise:"
          echo "- Paketname"
          echo "- installierte Version"
          echo "- OSV-ID"
          echo "- CVE-ID, falls vorhanden"
          echo "- Link zur Schwachstelle"
          echo "- betroffene Versionen"
          echo "- mögliche Fix-Versionen"
          echo ""
          echo "Der Workflow läuft trotz Funden weiter."
          echo "============================================================"
          echo ""

  test:
    name: Test Django App
    runs-on: self-hosted
    needs: osv_scan

    env:
      USE_SQLITE: "True"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: ""
      OPENWEATHER_API_KEY: "dummy-for-tests"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python Version anzeigen
        run: |
          python3 --version

      - name: Virtuelle Umgebung erstellen
        run: |
          python3 -m venv .venv

      - name: Abhängigkeiten installieren
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django Systemcheck ausführen
        run: |
          . .venv/bin/activate
          python manage.py check

      - name: Prüfen ob Migrationen fehlen
        run: |
          . .venv/bin/activate
          python manage.py makemigrations --check --dry-run

      - name: Django Tests ausführen
        run: |
          . .venv/bin/activate
          python manage.py test app --verbosity 2

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push')

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen
        run: |
          docker compose build --pull web

  deploy:
    name: Deploy on yfserver
    runs-on: self-hosted
    needs: build

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: MyTools auf Server deployen
        run: |
          set -e

          cd /opt/mytools

          echo "Hole Änderungen aus main..."
          git fetch origin main
          git reset --hard origin/main

          echo "Starte Docker Deployment..."
          docker compose pull db redis caddy || true
          docker compose up -d --build --remove-orphans

          echo "Warte kurz bis der Webserver antwortet..."
          for i in {1..20}; do
            if curl -fsS http://localhost:8090 > /dev/null; then
              echo "Webserver ist erreichbar."
              break
            fi

            echo "Webserver noch nicht erreichbar, Versuch $i/20..."
            sleep 3

            if [ "$i" -eq 20 ]; then
              echo "Fehler: Webserver ist nach dem Deployment nicht erreichbar."
              docker compose ps
              docker compose logs --tail=80 web
              docker compose logs --tail=80 caddy
              exit 1
            fi
          done

          echo "Container Status:"
          docker compose ps

          echo "Räume alte Docker Images auf..."
          docker image prune -f

          echo "Deployment fertig."