name: Test, Build and Deploy MyTools

on:
  workflow_dispatch:

  # Pushes sollen weiter den Workflow starten, damit Feature-Branches getestet
  # und main nach einem Merge deployed werden kann.
  # develop wird ignoriert, damit dort kein zusätzlicher Lauf entsteht.
  push:
    branches:
      - "**"
      - "!develop"

  # Pull-Request-Läufe nur für PRs nach main.
  # Der Test-Job selbst überspringt PRs aus develop/main nochmal explizit.
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # Wichtig:
  # Bei pull_request ist github.head_ref der Quell-Branch.
  # Bei push ist github.ref_name der gepushte Branch.
  # Dadurch landen Push-Run und PR-Run vom selben Branch in derselben Gruppe.
  group: mytools-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  osv_scan:
    name: OSV Security Scan
    runs-on: self-hosted
    timeout-minutes: 10

    # OSV nur bei direkten Pushes auf Arbeits-/Feature-Branches ausfuehren.
    # Pull Requests, main-Merges, Deploys und manuelle Laeufe sollen nicht
    # auf den Security-Scan warten.
    if: github.event_name == 'push' && github.ref_name != 'main' && github.ref_name != 'develop'

    permissions:
      contents: read
      actions: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: OSV Scanner installieren
        run: |
          set -e

          OSV_VERSION="v2.3.8"

          curl -L             "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"             -o osv-scanner

          chmod +x osv-scanner

          ./osv-scanner --version

      - name: OSV Scanner ausführen
        run: |
          echo ""
          echo "============================================================"
          echo "Starte OSV Security Scan..."
          echo "Dieser Schritt ist nur eine Warnung und blockiert den Workflow nicht."
          echo "============================================================"
          echo ""

          set +e

          ./osv-scanner scan source -r .             --no-resolve             --skip-git             --skip-path .venv             --skip-path venv             --skip-path node_modules             --skip-path staticfiles             --skip-path media             --skip-path .git

          OSV_EXIT_CODE=$?

          echo ""
          echo "============================================================"
          echo "OSV Scan beendet mit Exit-Code: $OSV_EXIT_CODE"
          echo ""
          echo "Wichtig:"
          echo "- Dieser Exit-Code wird ignoriert."
          echo "- Der Workflow läuft weiter."
          echo "- Wenn Schwachstellen gefunden wurden, stehen sie oben im Log."
          echo "============================================================"

          exit 0

      - name: Hinweis zum OSV Scan
        if: always()
        run: |
          echo ""
          echo "============================================================"
          echo "OSV Security Scan wurde ausgeführt."
          echo ""
          echo "Wenn Sicherheitslücken gefunden wurden, findest du sie im Log vom Schritt:"
          echo "'OSV Scanner ausführen'"
          echo ""
          echo "Dort stehen normalerweise:"
          echo "- Paketname"
          echo "- installierte Version"
          echo "- OSV-ID"
          echo "- CVE-ID, falls vorhanden"
          echo "- Link zur Schwachstelle"
          echo "- betroffene Versionen"
          echo "- mögliche Fix-Versionen"
          echo ""
          echo "Der Workflow läuft trotz Funden weiter."
          echo "============================================================"
          echo ""

  test:
    name: Test Django App
    runs-on: self-hosted
    timeout-minutes: 25

    # Tests nur für Arbeits-/Feature-Branches.
    # Nicht auf main und nicht auf develop, damit Merge- und Develop-Läufe
    # nicht nochmal die komplette Testsuite starten.
    if: |
      (github.event_name == 'push' && github.ref_name != 'main' && github.ref_name != 'develop') ||
      (github.event_name == 'pull_request' && github.head_ref != 'main' && github.head_ref != 'develop') ||
      (github.event_name == 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'develop')

    env:
      USE_SQLITE: "True"
      USE_LOCAL_CACHE: "True"
      DEBUG: "True"
      SECRET_KEY: "test-secret-key-only-for-ci"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: ""
      OPENWEATHER_API_KEY: "dummy-for-tests"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python Version anzeigen
        run: |
          python3 --version

      - name: Virtuelle Umgebung erstellen
        run: |
          python3 -m venv .venv

      - name: Abhängigkeiten installieren
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django Systemcheck ausführen
        run: |
          . .venv/bin/activate
          python manage.py check

      - name: Prüfen ob Migrationen fehlen
        run: |
          . .venv/bin/activate
          python manage.py makemigrations --check --dry-run

      - name: Django Tests ausführen
        run: |
          . .venv/bin/activate
          python manage.py test app --verbosity 2

  build:
    name: Build Docker Image
    runs-on: self-hosted
    timeout-minutes: 20

    # Build nach Push/Merge auf main oder manuell.
    # Der Build hängt nicht vom Test-Job ab, weil Tests auf main bewusst
    # übersprungen werden.
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen
        run: |
          docker compose build --pull web

  deploy:
    name: Deploy on yfserver
    runs-on: self-hosted
    needs: build
    timeout-minutes: 15

    # Deployment nur nach echtem Push/Merge auf main, nicht bei Pull Requests.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: MyTools auf Server deployen
        run: |
          set -e

          cd /opt/mytools

          echo "Hole Änderungen aus main..."
          git fetch origin main
          git reset --hard origin/main

          echo "Erzeuge Git-Changelog für die Was-ist-neu-Seite..."
          python3 scripts/generate_git_changelog.py --limit 20 || echo "Git-Changelog konnte nicht erzeugt werden. Deployment läuft weiter."

          echo "Starte Docker Deployment..."
          docker compose pull db redis caddy cloudflared || true
          docker compose up -d --build --remove-orphans

          echo "Warte kurz bis der Webserver über Port 8090 antwortet..."

          for i in {1..20}; do
            if curl -fsS http://localhost:8090 > /dev/null; then
              echo "Webserver ist erreichbar."
              break
            fi

            echo "Webserver noch nicht erreichbar, Versuch $i/20..."
            sleep 3

            if [ "$i" -eq 20 ]; then
              echo "Fehler: Webserver ist nach dem Deployment nicht erreichbar."
              echo ""
              echo "Container Status:"
              docker compose ps

              echo ""
              echo "============================================================"
              echo "Web-Logs"
              echo "============================================================"
              docker compose logs --tail=100 web

              echo ""
              echo "============================================================"
              echo "Caddy-Logs"
              echo "============================================================"
              docker compose logs --tail=100 caddy

              echo ""
              echo "============================================================"
              echo "Cloudflared-Logs"
              echo "============================================================"
              docker compose logs --tail=100 cloudflared || true

              exit 1
            fi
          done

          echo "Container Status:"
          docker compose ps

          echo "Räume alte Docker Images auf..."
          docker image prune -f

          echo "Deployment fertig."
