name: Deploy MyTools

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on yfserver
    runs-on: self-hosted

    steps:
      - name: Deploy MyTools
        run: |
          set -e

          cd /opt/mytools

          echo "Hole Änderungen aus main..."
          git fetch origin main
          git reset --hard origin/main

          echo "Baue und starte Docker Container..."
          docker compose up -d --build

          echo "Räume alte Docker Images auf..."
          docker image prune -f

          echo "Deployment fertig."