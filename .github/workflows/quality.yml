name: Quality Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Django quality gate
    runs-on: ubuntu-latest

    env:
      USE_SQLITE: "True"
      USE_LOCAL_CACHE: "True"
      DEBUG: "True"
      SECRET_KEY: "quality-check-secret"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: ""
      OPENWEATHER_API_KEY: "dummy-for-tests"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality checks
        run: python scripts/verify.py
