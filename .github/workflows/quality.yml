name: Quality Checks (disabled)

# Die automatischen Quality Checks wurden deaktiviert, weil sie bei Merges
# unnötig lange liefen bzw. hängen bleiben konnten.
#
# Wichtig:
# - Dieser Workflow startet NICHT mehr automatisch bei push/pull_request.
# - Dadurch blockiert er keine Merges mehr.
# - Falls du später wieder Checks brauchst, kannst du lokal weiterhin ausführen:
#   python scripts/verify.py --test-label app

on:
  workflow_dispatch:

concurrency:
  group: quality-disabled-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  disabled:
    name: Quality checks disabled
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Hinweis
        run: |
          echo "Automatische Quality Checks sind deaktiviert."
          echo "Dieser Workflow läuft nur noch manuell und blockiert keine Merges mehr."
          echo "Lokale Checks bei Bedarf: python scripts/verify.py --test-label app"
