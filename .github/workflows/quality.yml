name: Quality Checks

on:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Django quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      USE_SQLITE: "True"
      USE_LOCAL_CACHE: "True"
      DEBUG: "True"
      SECRET_KEY: "quality-check-secret"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: ""
      OPENWEATHER_API_KEY: "dummy-for-tests"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        timeout-minutes: 5
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quality checks
        timeout-minutes: 15
        run: python scripts/verify.py --test-label app
